<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>네이버 클라우드 · Cloud Credit Lab</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/cloud.css" />
    <link rel="stylesheet" href="/ui.css" />
  </head>
  <body>
    <header class="plain-header">
      <a href="/">← 통합 콘솔</a><strong>네이버클라우드 제어</strong
      ><a href="/ncp-storage">파일 저장소</a>
    </header>
    <main class="plain-main">
      <section>
        <p class="label">Live NCP API</p>
        <h1>네이버클라우드<br />실제 기능</h1>
        <p class="lead">
          Vercel 서버가 암호화된 인증키로 실제 NCP API를 호출합니다.
        </p>
        <div class="connect">
          <div>
            <b>NCP 인증</b><span id="status">확인 필요</span
            ><button data-action="status">연결 테스트</button>
          </div>
          <div>
            <b>이번 달 청구액</b><span id="billing">확인 필요</span
            ><button data-action="billing">실제 비용 조회</button>
          </div>
          <div>
            <b>서버</b><span id="servers">확인 필요</span
            ><button data-action="servers">서버 조회</button>
          </div>
        </div>
        <pre id="output" class="cloud-output">기능을 선택하세요.</pre>
      </section>
    </main>
    <script src="/ncp-app.js"></script>
  </body>
</html>
