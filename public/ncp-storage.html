<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>네이버 파일 저장소 · Work Memory</title><link rel="stylesheet" href="/style.css"><link rel="stylesheet" href="/storage.css"></head><body data-storage-api="/api/ncp-storage" data-provider="네이버클라우드"><header class="plain-header"><a href="/">← 통합 콘솔</a><strong>네이버 Object Storage</strong><button id="logout">로그아웃</button></header><main class="plain-main"><section class="storage-page"><p class="label">실제 클라우드 파일 관리</p><h1>네이버 파일 저장소</h1><p class="lead">버킷과 파일을 실제로 만들고, 올리고, 내려받고, 삭제합니다. 모든 요청은 로그인된 서버를 거쳐 처리되며 키는 브라우저에 노출되지 않습니다.</p><div class="storage-toolbar"><input id="bucketName" placeholder="새 버킷 이름 (영문 소문자, 숫자, 하이픈)"><button id="createBucket">버킷 만들기</button><button id="refresh">새로고침</button></div><p id="message" class="status-line">연결 중…</p><div class="storage-layout"><div class="bucket-panel"><h2>버킷</h2><div id="buckets" class="storage-list"></div></div><div class="object-panel"><div class="object-head"><div><small>선택한 버킷</small><h2 id="selectedBucket">선택 안 함</h2></div><label class="upload">파일 올리기<input id="file" type="file" disabled></label></div><div id="objects" class="storage-list"><div class="empty">왼쪽에서 버킷을 선택하세요.</div></div></div></div></section></main><script src="/storage-app.js"></script></body></html>
