<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>네이버 파일 저장소 · Work Memory</title><link rel="stylesheet" href="/style.css"><link rel="stylesheet" href="/storage.css"><link rel="stylesheet" href="/estimate.css"></head><body data-storage-api="/api/ncp-storage" data-provider-key="naver"><header class="plain-header"><a href="/">← 통합 콘솔</a><strong>네이버 Object Storage</strong><button id="logout">로그아웃</button></header><main class="plain-main"><section class="storage-page"><p class="label">실제 클라우드 파일 관리</p><h1>네이버 파일 저장소</h1><p class="lead">대용량 파일도 브라우저에서 저장소로 직접 올립니다. 업로드 전에 파일 크기와 30일 보관 기준 예상 비용을 확인합니다.</p><div class="storage-toolbar"><input id="bucketName" placeholder="새 버킷 이름 (영문 소문자, 숫자, 하이픈)"><button id="createBucket">버킷 만들기</button><button id="refresh">새로고침</button></div><p class="cost-estimate">가격 기준: 저장 28원/GB·월 · 업로드 요청 0.0045원 · 다운로드 요청 0.0004원 · VAT 별도</p><p id="message" class="status-line">연결 중…</p><div class="storage-layout"><div class="bucket-panel"><h2>버킷</h2><div id="buckets" class="storage-list"></div></div><div class="object-panel"><div class="object-head"><div><small>선택한 버킷</small><h2 id="selectedBucket">선택 안 함</h2></div><label class="upload">파일 올리기<input id="file" type="file" disabled></label></div><div id="objects" class="storage-list"><div class="empty">왼쪽에서 버킷을 선택하세요.</div></div></div></div></section></main><script src="/storage-app.js"></script></body></html>
