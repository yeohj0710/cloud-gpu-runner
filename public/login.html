<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>로그인 | Cloud GPU Runner</title>
    <link rel="icon" href="data:," />
    <style>
      *{box-sizing:border-box}body{display:grid;min-height:100vh;margin:0;place-items:center;background:#f9fafb;color:#191f28;font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif}.box{width:min(420px,calc(100% - 40px));border:1px solid #e5e8eb;border-radius:24px;padding:36px;background:#fff;box-shadow:0 18px 60px rgba(25,31,40,.08)}.mark{display:grid;width:42px;height:42px;place-items:center;border-radius:12px;background:#191f28;color:#fff;font-weight:800}h1{margin:28px 0 10px;font-size:30px}p{margin:0;color:#6b7684;line-height:1.55}form{display:grid;gap:10px;margin-top:28px}input{height:52px;border:1px solid #d1d6db;border-radius:12px;padding:0 15px;font:inherit;font-size:18px}input:not(:placeholder-shown){letter-spacing:5px}input:focus{border-color:#3182f6;outline:3px solid #e8f3ff}button{height:52px;border:0;border-radius:12px;background:#3182f6;color:#fff;font:inherit;font-weight:750;cursor:pointer}.error{min-height:20px;color:#b4232a;font-size:13px}.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
    </style>
  </head>
  <body>
    <main class="box">
      <div class="mark">C</div><h1>Cloud GPU Runner</h1>
      <p>GPU 크레딧과 작업 내역은 승인된 사용자만 확인할 수 있어요.</p>
      <form id="form"><input class="sr-only" name="username" autocomplete="username" value="cloud-gpu-runner" /><input id="password" type="password" inputmode="numeric" autocomplete="current-password" placeholder="비밀번호" autofocus /><button>로그인</button><div id="error" class="error" role="alert"></div></form>
    </main>
    <script>
      document.querySelector("#form").addEventListener("submit",async(event)=>{event.preventDefault();const error=document.querySelector("#error");error.textContent="";const response=await fetch("/api/login",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({password:document.querySelector("#password").value})});if(response.ok)location.replace("/");else error.textContent="비밀번호가 올바르지 않아요."});
    </script>
  </body>
</html>
