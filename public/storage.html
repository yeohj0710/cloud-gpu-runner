<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kakao Object Storage</title><link rel="stylesheet" href="/style.css"><link rel="stylesheet" href="/cloud.css"></head><body><header style="margin-left:0"><b>Kakao Object Storage</b><a href="/">통합 대시보드</a></header><main style="margin-left:0"><section><p class="label">Live S3 API</p><h1>카카오 스토리지<br>실제 연결</h1><p class="lead">발급한 S3 자격증명을 Vercel 서버에서만 사용하며 브라우저에는 키를 전달하지 않습니다.</p><div class="connect"><div><b>S3 인증</b><span id="state">확인 필요</span><button id="list">버킷 실제 조회</button></div></div><div id="output" class="cloud-output">버튼을 눌러 연결을 확인하세요.</div></section></main><script>document.querySelector('#list').onclick=async()=>{const o=document.querySelector('#output'),s=document.querySelector('#state');o.textContent='카카오 Object Storage 연결 중…';const r=await fetch('/api/kakao-storage'),d=await r.json();if(!r.ok){s.textContent='연결 실패';o.textContent='오류: '+d.error;return}s.textContent='연결됨 · '+d.items.length+'개';o.textContent=d.items.length?d.items.map(x=>x.name+' · '+x.created_at).join('\n'):'연결 성공 · 현재 버킷이 없습니다.'};</script></body></html>
